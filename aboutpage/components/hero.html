<style>
#hero { position: relative; background-color: #ffffff; padding-top: 20px; overflow: hidden; }
#hero .hero-inner { display: grid; grid-template-columns: 1fr; align-items: center; gap: 32px; text-align: center; max-width: 1320px; margin: 0 auto; padding: 0 18px; box-sizing: border-box; }
#hero .hero-content { max-width: 520px; margin: 0 auto; }
#hero .hero-heading { font-family: 'Baloo 2', sans-serif; font-weight: 800; font-size: 32px; line-height: 1.18; display: flex; flex-direction: column; align-items: center; margin: 0; }
#hero .hero-heading .navy { color: #1B2A4E; }

#hero .stats-bar { display: grid; grid-template-columns: repeat(2, 1fr); background: #ffffff; border-radius: 20px; padding: 20px; margin: 32px auto 40px; max-width: 1320px; box-shadow: 0 20px 50px rgba(27, 42, 78, 0.08); gap: 18px 12px; box-sizing: border-box; }
#hero .stat { display: flex; align-items: center; gap: 10px; min-width: 0; }
#hero .stat-icon { width: 44px; height: 44px; min-width: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

#hero .stat-text p { font-size: 12.5px; color: #6B7280; font-weight: 400; margin: 2px 0 0; font-family: 'Poppins', sans-serif; }
#hero .stat-divider { display: none; }
#hero .icon { flex-shrink: 0; vertical-align: middle; }
#hero .reveal { opacity: 0; transform: translateY(28px); transition: opacity 0.7s cubic-bezier(0.16, 0.84, 0.44, 1), transform 0.7s cubic-bezier(0.16, 0.84, 0.44, 1); }
#hero .reveal.in-view { opacity: 1; transform: none; }
@media (prefers-reduced-motion: reduce) { #hero .reveal { opacity: 1; transform: none; transition: none; } }
@media (min-width: 480px) { #hero .btn { flex: 0 1 auto; padding: 15px 24px; font-size: 15px; } }
@media (min-width: 640px) { #hero .hero-inner { padding: 0 28px; } #hero .hero-heading { font-size: 40px; } #hero .stats-bar { grid-template-columns: repeat(3, 1fr); padding: 26px 30px; } }
@media (min-width: 768px) { #hero .hero-heading { font-size: 46px; } #hero .hero-sub { font-size: 16px; } #hero .hero-buttons { gap: 14px; } #hero .btn { padding: 16px 30px; font-size: 15.5px; } #hero .stats-bar { gap: 22px 18px; padding: 28px 34px; } #hero .stat-icon { width: 46px; height: 46px; min-width: 46px; } #hero .stat-text strong { font-size: 17px; } #hero .stat-text p { font-size: 13px; } }
@media (min-width: 960px) { #hero { padding-top: 30px; } #hero .hero-inner { grid-template-columns: 0.95fr 1.15fr; gap: 40px; text-align: left; padding: 0 40px; } #hero .hero-content { margin: 0; } #hero .hero-heading { font-size: 54px; align-items: flex-start; } #hero .hero-sub { margin-top: 22px; font-size: 17px; } #hero .hero-buttons { justify-content: flex-start; margin-top: 32px; gap: 16px; } #hero .stats-bar { display: flex; flex-wrap: wrap; justify-content: space-between; padding: 30px 40px; margin: 50px auto 60px; gap: 20px; } #hero .stat-icon { width: 48px; height: 48px; min-width: 48px; } #hero .stat-text strong { font-size: 20px; white-space: nowrap; } #hero .stat-text p { font-size: 14px; white-space: nowrap; } }
@media (min-width: 1100px) { #hero .stat-divider { display: block; width: 1px; height: 46px; background: #EAEAF0; } }
</style>

<script>
(function () {
  var thisScript = document.currentScript;
  var section = thisScript.previousElementSibling;
  var revealEls = section.querySelectorAll('.reveal');
  if ('IntersectionObserver' in window && revealEls.length) {
    var groups = new Map();
    var observer = new IntersectionObserver(function (entries) {
      entries.forEach(function (entry) {
        if (!entry.isIntersecting) return;
        var el = entry.target;
        var parent = el.parentElement;
        var siblingIndex = groups.get(parent) || 0;
        el.style.transitionDelay = Math.min(siblingIndex, 6) * 70 + 'ms';
        groups.set(parent, siblingIndex + 1);
        el.classList.add('in-view');
        observer.unobserve(el);
      });
    }, { threshold: 0.15, rootMargin: '0px 0px -40px 0px' });
    revealEls.forEach(function (el) { observer.observe(el); });
  } else {
    revealEls.forEach(function (el) { el.classList.add('in-view'); });
  }
})();
</script>
